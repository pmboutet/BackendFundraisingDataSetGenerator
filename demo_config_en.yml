# Demographic settings
SALUTATIONS:
  - civility: "Mr."
    gender: "male"
    probability: 0.45
  - civility: "Mrs."
    gender: "female"
    probability: 0.35
  - civility: "Ms."
    gender: "female"
    probability: 0.15
  - civility: "Dr."
    gender: "other"
    probability: 0.05

